name: Refresh GitHub data

# Snapshots the portfolio owner's profile and repositories into data.json so the
# site serves pre-fetched data instead of hitting the GitHub API from each
# visitor's browser. Runs on a schedule and can be triggered manually.
on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_USER: fcarvajalbrown
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build data.json snapshot
        run: |
          set -euo pipefail
          ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh api "users/${GH_USER}" > profile.json
          gh api "users/${GH_USER}/repos?sort=updated&per_page=100" --paginate \
            | jq -s 'add' > repos.json
          jq -n \
            --slurpfile p profile.json \
            --slurpfile r repos.json \
            --arg ts "$ts" \
            '{generated_at: $ts, profile: $p[0], repos: $r[0]}' > data.json
          rm -f profile.json repos.json
          echo "Snapshot repos: $(jq '.repos | length' data.json)"

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Skip the commit unless profile/repos actually changed. data.json carries
          # a generated_at timestamp that changes every run, so compare it stripped.
          if git show HEAD:data.json > old.json 2>/dev/null \
             && diff -q <(jq -S 'del(.generated_at)' old.json) \
                        <(jq -S 'del(.generated_at)' data.json) >/dev/null; then
            echo "No substantive changes; skipping commit."
            rm -f old.json
            exit 0
          fi
          rm -f old.json
          git add data.json
          git commit -m "chore: refresh GitHub data snapshot"
          # master may move under us (an outside push lands mid-run). Rebase on the
          # latest remote and retry rather than failing with a non-fast-forward.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:master; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing on latest master..."
            git pull --rebase --autostash origin master
          done
          echo "Failed to push after 5 attempts." >&2
          exit 1
